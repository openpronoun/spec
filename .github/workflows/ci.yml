name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build (turbo — packages → docs)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Check exports (publint + attw)
        run: npm run check:exports

      # Require a changeset for PRs that touch publishable packages.
      # The docs workspace is ignored (private + in changeset ignore list).
      - name: Changeset status
        if: github.event_name == 'pull_request'
        run: npx changeset status --since=origin/main
